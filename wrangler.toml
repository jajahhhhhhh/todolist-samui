name = "chowto-telegram-bot"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── Routes ───────────────────────────────────────────────────────────────────
# Uncomment and set your custom domain if needed:
# routes = [{ pattern = "bot.ch-howtoniksen.com/*", zone_name = "ch-howtoniksen.com" }]

# ─── Environment Variables ────────────────────────────────────────────────────
# Set secrets via CLI (NEVER commit real values here):
#   npx wrangler secret put BOT_TOKEN
#   npx wrangler secret put CLAUDE_API_KEY
#   npx wrangler secret put WEBHOOK_SECRET

[vars]
# Non-secret config vars can go here
ENVIRONMENT = "production"

# ─── Optional: KV Namespace for persistent chat history ──────────────────────
# After creating KV namespace: npx wrangler kv:namespace create "CHOWTO_SESSIONS"
# Then uncomment:
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"
